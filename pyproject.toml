[tool.ruff]
include = ["extensions/slicerSTRT/**/*.py"]
extend-exclude = [
  "apps",
  "knowledge",
  "source",
  "workspace",
  "config/local.json",
  "**/.git/**",
  "**/.mypy_cache/**",
  "**/.pytest_cache/**",
  "**/.ruff_cache/**",
  "**/.venv/**",
  "**/Build/**",
  "**/build/**",
  "**/__pycache__/**",
  "**/generated/**",
  "**/venv/**",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]
